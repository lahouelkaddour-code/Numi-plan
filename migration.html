function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '<span class="' + (cls||'') + '">' + msg + '</span>\n';
  el.scrollTop = el.scrollHeight;
}

window.migrate = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Migration en cours...';
  document.getElementById('log').innerHTML = '';

  try {
    log('🔌 Connexion Firebase...', 'warn');
    
    const payloadStr = JSON.stringify(PAYLOAD);
    log('📦 Payload: ' + PAYLOAD.chauffeurs.length + ' chauffeurs, ' + PAYLOAD.camions.length + ' camions', 'warn');
    log('📏 Taille: ' + payloadStr.length + ' chars', 'warn');

    const ref = doc(db, 'numiplan', 'numi_plan_chauffeurs');
    await setDoc(ref, { _data: payloadStr, _ts: Date.now() });
    
    log('✅ Migration réussie !', 'ok');
    log('👥 ' + PAYLOAD.chauffeurs.length + ' chauffeurs écrits dans Firebase', 'ok');
    log('🚛 ' + PAYLOAD.camions.length + ' camions écrits dans Firebase', 'ok');
    log('\n✅ Tu peux maintenant recharger Numi-Plan sur GitHub.', 'ok');
    
    btn.textContent = '✅ Migration réussie !';
    btn.style.background = '#00b894';

  } catch(err) {
    log('❌ Erreur: ' + err.message, 'err');
    console.error(err);
    btn.disabled = false;
    btn.textContent = '🔄 Réessayer';
  }
};

log('✅ Page chargée — Firebase prêt', 'ok');
